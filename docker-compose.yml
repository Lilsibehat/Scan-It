version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: ../Dockerfile
    ports:
      - "5000:5000"
    environment:
      FLASK_ENV: development
      FLASK_APP: app.py
      SECRET_KEY: dev-secret-key
      VIRUSTOTAL_API_KEY: ${VIRUSTOTAL_API_KEY}
      URLHAUS_API_KEY: ${URLHAUS_API_KEY}
      DATABASE_URL: postgresql://scan_it:scan_it@db:5432/scan_it
    depends_on:
      - db
    volumes:
      - ./backend:/app
    command: python app.py

  frontend:
    build:
      context: ./frontend
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
      BACKEND_URL: http://backend:5000
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
    command: npm start

  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: scan_it
      POSTGRES_PASSWORD: scan_it
      POSTGRES_DB: scan_it
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
